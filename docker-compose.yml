services:
  postgres:
    image: postgres:16
    container_name: rushmore-seat-postgres
    environment:
      POSTGRES_DB: rushseat
      POSTGRES_USER: rushseat
      POSTGRES_PASSWORD: rushseat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rushseat -d rushseat"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.2
    container_name: rushmore-seat-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rushmore-seat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - postgres
      - redis

  grafana:
    image: grafana/grafana:11.3.0
    container_name: rushmore-seat-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
